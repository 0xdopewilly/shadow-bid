[localnet]
# number of nodes in the single cluster of the localnet
nodes = 2
# optional nodes ips overrides (default: 172.20.0.[100..(100 + nodes - 1)])
nodes_ips = [
  [172, 20, 0, 100],
  [172, 20, 0, 101]
]
# Seconds to wait for Solana localnet RPC (Arcium wraps Anchor; default 60 is often too low for heavy genesis).
localnet_timeout_secs = 300
# MPC backends this MXE supports (default: ["Cerberus"])
# Supported values: "Cerberus"
backends = ["Cerberus"]

# Cluster offsets for non-localnet testing (see Arcium deployment docs).
[clusters.devnet]
offset = 456
