name: Web (Vercel source)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: https://example.com
      NEXT_PUBLIC_SOLANA_RPC_URL: https://api.devnet.solana.com
      NEXT_PUBLIC_ARCIUM_CLUSTER_OFFSET: "456"
      NEXT_PUBLIC_SHADOW_BID_PROGRAM_ID: EvyVpkAWdKABJAZZ73YkMwGiVS3QJMEJ7vHvKh6FYuBt
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - name: Verify Arcium / IDL / CI env alignment
        run: node scripts/check-config-alignment.mjs
      - uses: actions/setup-node@v4
        with:
          node-version-file: web/.nvmrc
          cache: yarn
          cache-dependency-path: web/yarn.lock
      - run: yarn install --frozen-lockfile
      - run: yarn build
