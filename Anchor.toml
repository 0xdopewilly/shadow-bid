[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
shadow_bid = "J1vKHNDu4gLpMrf4Zwzca74rjJo4Lx5MvgKUU7B7UWN7"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""

[test]
startup_wait = 300000
shutdown_wait = 2000
upgradeable = false
